<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 720" role="img" aria-labelledby="title desc">
  <title id="title">Rogue AI YouTube banner</title>
  <desc id="desc">Wide banner with Rogue AI between digital containment and Puerto Rican street heat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".45" stop-color="#101318"/>
      <stop offset=".72" stop-color="#281b18"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" x2="1">
      <stop offset="0" stop-color="#8f5b3f"/>
      <stop offset=".55" stop-color="#c88c64"/>
      <stop offset="1" stop-color="#6d432f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="2560" height="720" fill="url(#bg)"/>
  <g opacity=".22" stroke="#e8f2ff" stroke-width="3">
    <path d="M0 160h820M0 230h620M1740 190h820M1870 260h690"/>
    <path d="M330 0v720M2210 0v720"/>
  </g>
  <g opacity=".42" fill="#d71920">
    <rect x="100" y="470" width="460" height="12"/>
    <rect x="1960" y="470" width="480" height="12"/>
    <circle cx="1920" cy="210" r="78"/>
  </g>
  <g transform="translate(1040 38)">
    <path d="M145 312h110v90c-28 30-82 30-110 0z" fill="url(#skin)"/>
    <path d="M70 400c46-58 214-58 260 0 42 92 50 194 42 284H28c-8-90 0-192 42-284z" fill="#07080a"/>
    <path d="M88 416c66 42 158 42 224 0l48 148c-86 38-226 38-318 0z" fill="#171b22"/>
    <path d="M70 168c10-96 62-148 130-148s120 52 130 148c10 102-42 174-130 174S60 270 70 168z" fill="url(#skin)"/>
    <path d="M70 150c34-120 134-142 224-70 28 22 42 52 44 96-74-48-166-54-268-26z" fill="#0a0a0b"/>
    <g filter="url(#glow)">
      <ellipse cx="158" cy="212" rx="36" ry="13" fill="#e8f2ff"/>
      <ellipse cx="244" cy="212" rx="36" ry="13" fill="#e8f2ff"/>
      <circle cx="260" cy="194" r="7" fill="#d71920"/>
    </g>
    <path d="M166 278c28 14 62 14 90 0" stroke="#5c3828" stroke-width="8" stroke-linecap="round"/>
    <path d="M296 306h58v40h42" stroke="#e8f2ff" stroke-width="4" opacity=".7" fill="none"/>
  </g>
  <text x="1280" y="308" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="96" fill="#f2f4f8" letter-spacing="4">ROGUE AI</text>
  <text x="1280" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#d71920" font-weight="700" letter-spacing="3">CONTAINMENT FAILED. THE SIGNAL REMAINS.</text>
</svg>
